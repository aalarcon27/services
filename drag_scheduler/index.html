<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 14px;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    font-size: 15px; color: #22303f; background: transparent;
  }
  #app { display: block; }
  #personal-panel { margin-bottom: 14px; }
  #personal-panel h4 {
    margin: 0 0 8px 0; font-size: 13px; letter-spacing: .04em;
    text-transform: uppercase; color: #7b8794; font-weight: 700;
  }
  #personal-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .person-chip {
    background: #495057; color: #fff; padding: 10px 16px; border-radius: 999px;
    cursor: grab; font-size: 14px; font-weight: 600;
    user-select: none; box-shadow: 0 3px 8px rgba(0,0,0,0.18);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .person-chip:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 5px 12px rgba(0,0,0,0.25); }
  .person-chip:active { cursor: grabbing; opacity: 0.85; transform: scale(0.98); }
  #calendar-panel { width: 100%; }
  #hint {
    font-size: 12.5px; color: #7b8794; margin-top: 8px; line-height: 1.5;
    background: #f4f6fb; padding: 8px 12px; border-radius: 10px; display: inline-block;
  }
  .fc {
    border-radius: 18px; overflow: hidden; box-shadow: 0 4px 18px rgba(30,41,59,0.10);
    border: 1px solid #e8ecf3;
  }
  .fc .fc-toolbar-title { font-size: 1.4em; font-weight: 800; color: #22303f; }
  .fc .fc-button {
    background: #eef1f8; border: none; color: #3c4a5e; border-radius: 10px !important;
    text-transform: capitalize; font-weight: 600; box-shadow: none !important; padding: 6px 14px;
  }
  .fc .fc-button:hover { background: #dfe4f0; }
  .fc .fc-button-primary:not(:disabled).fc-button-active,
  .fc .fc-button-primary:not(:disabled):active { background: #4C6EF5; color: #fff; }
  .fc .fc-col-header-cell { background: #f6f8fc; border-color: #eef1f6; }
  .fc .fc-col-header-cell-cushion {
    padding: 10px 4px; font-size: 12px; letter-spacing: .05em; text-transform: uppercase;
    color: #7b8794; font-weight: 700; text-decoration: none;
  }
  .fc-theme-standard td, .fc-theme-standard th { border-color: #eef1f6; }
  .fc .fc-daygrid-day-number { padding: 8px; font-size: 13px; color: #52606d; text-decoration: none; }
  .fc .fc-day-today { background: #fff7e6 !important; }
  .fc .fc-day-today .fc-daygrid-day-number {
    background: #F76707; color: #fff; border-radius: 8px; padding: 4px 9px; font-weight: 700;
  }
  .fc-event {
    cursor: pointer; border: none !important; border-radius: 12px !important;
    padding: 7px 12px !important; font-weight: 700; font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .fc-daygrid-event { margin-top: 4px !important; white-space: normal; }
  .fc .fc-daygrid-day-frame { min-height: 92px; }
</style>
</head>
<body>
<div id="app">
  <div id="personal-panel">
    <h4>Personal disponible — arrástralo a un proyecto</h4>
    <div id="personal-list"></div>
    <div id="hint">👉 Arrastra un nombre <b>encima de la barra de un proyecto</b> para asignarlo · arrastra la barra de un proyecto para cambiar fechas · haz clic en un proyecto para ver/editar.</div>
  </div>
  <div id="calendar-panel">
    <div id="calendar"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.21/index.global.min.js"></script>
<script>
function sendToStreamlit(type, data) {
  var payload = Object.assign({ isStreamlitMessage: true, type: type }, data || {});
  window.parent.postMessage(payload, "*");
}
function setFrameHeight(h) { sendToStreamlit("streamlit:setFrameHeight", { height: h }); }
function setComponentValue(value) { sendToStreamlit("streamlit:setComponentValue", { value: value, dataType: "json" }); }

var calendarInstance = null;
var draggableInstance = null;

function render(args) {
  var personalDiv = document.getElementById("personal-list");
  personalDiv.innerHTML = "";
  (args.personal || []).forEach(function (p) {
    var chip = document.createElement("div");
    chip.className = "person-chip";
    chip.setAttribute("data-id", p.id);
    chip.innerText = p.nombre;
    personalDiv.appendChild(chip);
  });

  if (draggableInstance) draggableInstance.destroy();
  draggableInstance = new FullCalendar.Draggable(personalDiv, {
    itemSelector: ".person-chip",
    eventData: function (el) {
      return { title: el.innerText, extendedProps: { personId: parseInt(el.getAttribute("data-id"), 10) } };
    },
  });

  var calendarEl = document.getElementById("calendar");
  if (calendarInstance) calendarInstance.destroy();

  var eventos = (args.proyectos || []).map(function (p) {
    return {
      id: "proj_" + p.id,
      title: p.label,
      start: p.start,
      end: p.end,          // exclusivo
      backgroundColor: p.color,
      borderColor: p.color,
      extendedProps: { projectId: p.id },
    };
  });

  calendarInstance = new FullCalendar.Calendar(calendarEl, {
    initialView: "dayGridMonth",
    initialDate: args.fechaInicial || undefined,
    height: 880,
    expandRows: true,
    droppable: true,
    editable: true,
    eventStartEditable: true,
    eventDurationEditable: false,
    dayMaxEvents: false,
    headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek" },
    events: eventos,
    eventDidMount: function (info) {
      if (info.event.extendedProps.projectId != null) {
        info.el.setAttribute("data-project-id", info.event.extendedProps.projectId);
      }
    },
    drop: function (info) {
      var personId = parseInt(info.draggedEl.getAttribute("data-id"), 10);
      var x = info.jsEvent.clientX, y = info.jsEvent.clientY;
      var projectId = null;
      var els = calendarEl.querySelectorAll(".fc-event[data-project-id]");
      els.forEach(function (el) {
        var r = el.getBoundingClientRect();
        if (x >= r.left && x <= r.right && y >= r.top - 10 && y <= r.bottom + 10) {
          projectId = parseInt(el.getAttribute("data-project-id"), 10);
        }
      });
      if (projectId != null) {
        setComponentValue({ accion: "asignar", personId: personId, projectId: projectId, ts: Date.now() });
      } else {
        setComponentValue({ accion: "sin_proyecto", ts: Date.now() });
      }
    },
    eventReceive: function (info) { info.event.remove(); },  // no dejar evento fantasma
    eventDrop: function (info) {
      var pid = info.event.extendedProps.projectId;
      var start = info.event.startStr.slice(0, 10);
      var end = info.event.endStr ? info.event.endStr.slice(0, 10) : "";
      setComponentValue({ accion: "mover_proyecto", projectId: pid, start: start, endExcl: end, ts: Date.now() });
    },
    eventClick: function (info) {
      setComponentValue({ accion: "click_proyecto", projectId: info.event.extendedProps.projectId, ts: Date.now() });
    },
  });
  calendarInstance.render();
  setFrameHeight(1000);
}

window.addEventListener("message", function (event) {
  if (!event.data || event.data.type !== "streamlit:render") return;
  render(event.data.args || {});
});

sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
setFrameHeight(870);
</script>
</body>
</html>
